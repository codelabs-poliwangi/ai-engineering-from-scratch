[build]
  command = "node site/build.js"
  publish = "site"

[[redirects]]
  from = "/glossary"
  to   = "/glossary.html"
  status = 200

[[redirects]]
  from = "/catalog"
  to   = "/catalog.html"
  status = 200

[[redirects]]
  from = "/path"
  to   = "/prereqs.html"
  status = 200

[[redirects]]
  from = "/roadmap"
  to   = "/prereqs.html"
  status = 200

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, s-maxage=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400, s-maxage=604800, stale-while-revalidate=2592000"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400, s-maxage=604800, stale-while-revalidate=2592000"
