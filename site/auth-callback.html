<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <script>(function(){var r=document.documentElement,s=localStorage.getItem('theme');if(s){r.setAttribute('data-theme',s);}else if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches){r.setAttribute('data-theme','dark');}else{r.setAttribute('data-theme','light');}})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signing In - AI Engineering from Zero</title>
  <link rel="stylesheet" href="style.css?v=20260523-zero5">
  <style>
    .callback-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 48px;
      background:
        linear-gradient(90deg, var(--paper-rule) 1px, transparent 1px),
        linear-gradient(180deg, var(--paper-rule) 1px, transparent 1px);
      background-size: 56px 56px;
    }

    .callback-card {
      width: min(560px, 100%);
      border: 1px solid var(--border);
      background: var(--bg);
      padding: 32px;
      box-shadow: 12px 12px 0 var(--blueprint-tint);
    }

    .callback-card p:first-child {
      margin: 0 0 10px;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--blueprint);
    }

    .callback-card h1 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 7vw, 3.4rem);
      line-height: 1;
    }

    .callback-card p {
      color: var(--ink-soft);
      line-height: 1.65;
    }
  </style>
</head>
<body>
  <main class="callback-page">
    <section class="callback-card">
      <p>Account verification</p>
      <h1>Finishing sign in.</h1>
      <p id="callbackStatus">Checking your verified session...</p>
    </section>
  </main>

  <script src="data.js?v=20260523-zero5"></script>
  <script src="progress.js?v=20260523-auth1"></script>
  <script src="i18n.js?v=20260523-admin2"></script>
  <script src="supabase-config.js?v=20260523-access1"></script>
  <script src="vendor/supabase-loader.js?v=20260523-admin2"></script>
  <script src="auth.js?v=20260523-admin5"></script>
  <script>
    (function () {
      var statusEl = document.getElementById('callbackStatus');
      var params = new URLSearchParams(window.location.search);
      var next = params.get('next') || 'profile.html';
      var lang = params.get('lang') || localStorage.getItem('aifs:lang') || 'en';

      function safeNext(url) {
        if (!url || /^https?:\/\//i.test(url) || url.indexOf('//') >= 0) return 'profile.html';
        return url;
      }

      function withLang(url) {
        var clean = safeNext(url);
        var joiner = clean.indexOf('?') >= 0 ? '&' : '?';
        return clean + joiner + 'verified=1&lang=' + encodeURIComponent(lang);
      }

      function finish(attempt) {
        if (!window.AIFSAuth && attempt < 30) {
          setTimeout(function () { finish(attempt + 1); }, 120);
          return;
        }
        if (!window.AIFSAuth || !window.AIFSAuth.isConfigured()) {
          statusEl.textContent = 'Account login is not ready yet. Please try again later.';
          return;
        }
        window.AIFSAuth.getSession().then(function (res) {
          var session = res && res.data ? res.data.session : null;
          if (!session) {
            statusEl.textContent = 'Verification finished, but no session was found. Please sign in again.';
            setTimeout(function () {
              window.location.href = 'login.html?next=' + encodeURIComponent(next) + '&lang=' + encodeURIComponent(lang);
            }, 1400);
            return null;
          }
          statusEl.textContent = 'Session ready. Redirecting...';
          return window.AIFSAuth.upsertProfile()
            .then(window.AIFSAuth.loadRemoteProgress)
            .then(window.AIFSAuth.syncProgress)
            .then(function () {
              window.location.href = withLang(next);
            });
        }).catch(function (err) {
          statusEl.textContent = err && err.message ? err.message : 'Could not finish sign in. Please try again.';
        });
      }

      finish(0);
      window.addEventListener('aifz:supabase-loaded', function () { finish(0); });
    })();
  </script>
</body>
</html>
