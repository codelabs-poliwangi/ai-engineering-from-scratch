  <style>
    .glossary-page {
      padding: 100px 0 80px;
      min-height: 100vh;
    }

    .glossary-header {
      text-align: left;
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 2px solid var(--border);
    }

    .glossary-header h1 {
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }

    .glossary-header p {
      color: var(--text-muted);
      font-size: 1rem;
    }

    .glossary-search-wrap {
      max-width: 500px;
      margin: 0 0 40px;
      position: relative;
    }

    .glossary-search {
      width: 100%;
      font-family: var(--font-body);
      font-size: 1.1rem;
      padding: 14px 20px;
      background: var(--bg-surface);
      border: 2px solid var(--border);
      border-radius: 0;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .glossary-search::placeholder {
      color: var(--text-muted);
    }

    .glossary-search:focus {
      border-color: var(--accent);
    }

    .glossary-count {
      text-align: left;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .glossary-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 800px;
      margin: 0;
    }

    .glossary-card {
      background: var(--bg-surface);
      border: 2px solid var(--border);
      border-radius: 0;
      padding: 24px;
      transition: background 0.15s;
    }

    .glossary-card:hover {
      background: var(--bg);
    }

    .glossary-term {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 1.3rem;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .glossary-row {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    .glossary-col {
      flex: 1;
      min-width: 200px;
    }

    .glossary-col-label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .glossary-col-says {
      color: var(--text-muted);
      font-size: 0.95rem;
      font-style: italic;
    }

    .glossary-col-means {
      color: var(--text);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .glossary-empty {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    @media (max-width: 768px) {
      .glossary-page {
        padding: 80px 0 48px;
      }

      .glossary-row {
        flex-direction: column;
        gap: 12px;
      }

      .glossary-card {
        padding: 18px 16px;
      }
    }

    @media (max-width: 480px) {
      .glossary-header h1 { font-size: 1.5rem; }
    }

    @keyframes skeleton-pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    .glossary-skeleton-card {
      background: var(--bg-surface);
      border: 2px solid var(--border);
      padding: 24px;
    }
    .glossary-skeleton-bar {
      height: 14px;
      background: var(--border);
      border-radius: 2px;
      animation: skeleton-pulse 1.4s ease-in-out infinite;
      margin-bottom: 10px;
    }
    .glossary-skeleton-bar.wide { width: 60%; }
    .glossary-skeleton-bar.narrow { width: 40%; }

  <script>
    (function () {
      var root = document.documentElement;
      var stored = localStorage.getItem('theme');
      if (stored) {
        root.setAttribute('data-theme', stored);
      } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        root.setAttribute('data-theme', 'dark');
      } else {
        root.setAttribute('data-theme', 'light');
      }

      function updateIcon() {
        var icon = document.getElementById('themeIcon');
        if (!icon) return;
        icon.textContent = root.getAttribute('data-theme') === 'light' ? '☾' : '☀';
      }

      updateIcon();

      document.addEventListener('DOMContentLoaded', function () {
        if (window.AIFSI18n) {
          window.AIFSI18n.initGlobalLanguage(new URLSearchParams(window.location.search));
          document.addEventListener('aifs:langchange', function () {
            renderGlossary((searchInput && searchInput.value || '').trim());
          });
        }
        updateIcon();

        var btn = document.getElementById('themeToggle');
        if (btn) {
          btn.addEventListener('click', function () {
            var next = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            root.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateIcon();
          });
        }

        var searchInput = document.getElementById('glossarySearch');
        var listEl = document.getElementById('glossaryList');
        var countEl = document.getElementById('glossaryCount');

        function escapeHtml(str) {
          var div = document.createElement('div');
          div.textContent = str;
          return div.innerHTML;
        }

        function renderGlossary(filter) {
          var terms = GLOSSARY;
          if (filter) {
            var q = filter.toLowerCase();
            terms = terms.filter(function (t) {
              return t.term.toLowerCase().indexOf(q) !== -1 ||
                t.says.toLowerCase().indexOf(q) !== -1 ||
                t.means.toLowerCase().indexOf(q) !== -1;
            });
          }

          countEl.textContent = i18nText('glossary.count', terms.length + ' of ' + GLOSSARY.length + ' terms', { shown: terms.length, total: GLOSSARY.length });

          if (terms.length === 0) {
            listEl.innerHTML = '<div class="glossary-empty">' + escapeHtml(i18nText('glossary.empty', 'No terms match your search.')) + '</div>';
            return;
          }

          var html = '';
          for (var i = 0; i < terms.length; i++) {
            var term = terms[i];
            html += '<div class="glossary-card">';
            html += '<div class="glossary-term">' + escapeHtml(term.term) + '</div>';
            html += '<div class="glossary-row">';
            html += '<div class="glossary-col">';
            html += '<div class="glossary-col-label">' + escapeHtml(i18nText('glossary.says', 'What people say')) + '</div>';
            html += '<div class="glossary-col-says">"' + escapeHtml(term.says) + '"</div>';
            html += '</div>';
            html += '<div class="glossary-col">';
            html += '<div class="glossary-col-label">' + escapeHtml(i18nText('glossary.means', 'What it actually means')) + '</div>';
            html += '<div class="glossary-col-means">' + escapeHtml(term.means) + '</div>';
            html += '</div>';
            html += '</div>';
            html += '</div>';
          }
          listEl.innerHTML = html;
        }

        // Support ?q= deep-links from the command palette and external sources.
        // Pre-populate the search box and filter to the matching term so the
        // user lands directly on the definition rather than the full list.
        var urlQ = '';
        try { urlQ = new URLSearchParams(window.location.search).get('q') || ''; } catch (_) {}
        if (urlQ && searchInput) {
          searchInput.value = urlQ;
        }

        renderGlossary(urlQ);

        if (searchInput) {
          searchInput.addEventListener('input', function () {
            renderGlossary(searchInput.value.trim());
          });
        }

        function i18nText(key, fallback, replacements) {
          if (!window.AIFSI18n) return fallback;
          return window.AIFSI18n.t(key, replacements);
        }
      });
    })();
  </script>
